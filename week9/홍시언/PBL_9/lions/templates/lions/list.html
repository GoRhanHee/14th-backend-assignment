{% extends 'base.html' %}

{% block content %}

<h1>아기사자 목록</h1>

<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: -apple-system, sans-serif; margin: 40px; }
        input, select { margin-bottom: 10px; display: block; padding: 5px; width: 200px; }
        button { cursor: pointer; padding: 5px 15px; }
    </style>
</head>

{# 검색 폼 #}
<form method="get" style="margin-bottom: 16px;">
  <input
    type="text"
    name="keyword"
    placeholder="이름 검색"
    value="{{ keyword }}"
  >

  <select name="track">
    <option value="">전체 트랙</option>
    <option value="Django" {% if track == "Django" %}selected{% endif %}>Django</option>
    <option value="Backend" {% if track == "Backend" %}selected{% endif %}>Backend</option>
    <option value="Frontend" {% if track == "Frontend" %}selected{% endif %}>Frontend</option>
  </select>

  <button type="submit">검색</button>
</form>


<ul>
  {% for lion in lions %}
    <li>
      <a href="{% url 'lion_detail' lion.id %}">
        {{ lion.name }} ({{ lion.track }})
      </a>
    </li>
  {% empty %}
    {% if keyword %}
      <li>검색 결과가 없습니다.</li>
    {% else %}
      <li>아직 등록된 아기사자가 없습니다.</li>
    {% endif %}
  {% endfor %}
</ul>

<hr>

<a href="{% url 'lion_create' %}">아기사자 등록</a>

{% endblock %}
