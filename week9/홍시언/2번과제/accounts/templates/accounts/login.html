<h2>로그인</h2>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}
    <input type="text"
        name=
"username" placeholder="아이디" required><br>
    <input type="password"
        name=
"password" placeholder="비밀번호" required><br>
    <button type="submit">로그인</button>
</form>

<hr>
<p>아직 계정이 없으신가요?</p>
<a href="{% url 'accounts:signup' %}">
    <button type=
"button">회원가입 하러가기</button>
</a>
