<h2>비밀번호 변경</h2>
<form method="post">
    {% csrf_token %}
    <p>현재 비밀번호: <input type="password" name="current_password"></p>
    <p>새 비밀번호: <input type="password" name="new_password"></p>
    <button type="submit">변경 확정</button>
</form>

{% if messages %}
    {% for message in messages %}
        <p style="color: red;">{{ message }}</p>
    {% endfor %}
{% endif %}
